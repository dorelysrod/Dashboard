name: "Bug"
description: Something is broken or behaves unexpectedly. Triggers the RCA chain (CLAUDE.md §2).
title: "[Bug] "
labels: ["type:bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's broken?
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options: ["Local", "Preview", "Staging", "Production"]
    validations:
      required: true
  - type: dropdown
    id: risk
    attributes:
      label: Risk
      options: ["Low", "Medium", "High", "Critical"]
  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      options: ["Frontend", "Backend", "Infrastructure", "Security", "Design", "Docs", "DevOps", "Agents"]
