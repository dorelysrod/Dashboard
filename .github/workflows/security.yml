name: Security

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]
  schedule:
    - cron: "0 6 * * 1" # weekly dependency check

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # gitleaks-action lee los commits del PR vía API
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: bash ci/detect-stack.sh
      - name: npm audit
        if: steps.detect.outputs.has_node == 'true'
        run: npm audit --audit-level=high
      - name: Set up Python
        if: steps.detect.outputs.has_python == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        if: steps.detect.outputs.has_python == 'true'
        run: |
          python -m pip install --upgrade pip pip-audit
          if [ -f requirements.txt ]; then pip-audit -r requirements.txt; else pip-audit; fi

  codeql:
    runs-on: ubuntu-latest
    # No bloqueante: el upload de SARIF de code scanning requiere GitHub Advanced
    # Security, que en repos PRIVADOS es de pago y aquí no está habilitado. El
    # análisis corre igual; para alertas reales, habilitar GHAS o hacer público
    # el repo y quitar este continue-on-error.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: bash ci/detect-stack.sh
      - name: Initialize CodeQL
        if: steps.detect.outputs.has_node == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.has_node == 'true'
        uses: github/codeql-action/analyze@v3
