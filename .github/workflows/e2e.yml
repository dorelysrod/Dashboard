name: E2E Tests

on:
  pull_request:
    branches: [develop, main]

jobs:
  detect-stack:
    runs-on: ubuntu-latest
    outputs:
      has_node: ${{ steps.detect.outputs.has_node }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: bash ci/detect-stack.sh

  e2e:
    needs: detect-stack
    if: needs.detect-stack.outputs.has_node == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        if: hashFiles('**/playwright.config.*') != ''
        run: npx playwright install --with-deps
      - run: npm run test:e2e --if-present
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  no-stack:
    needs: detect-stack
    if: needs.detect-stack.outputs.has_node != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "No e2e-capable stack detected yet — see ARCHITECTURE.md Hour 0 bootstrap."
