name: Deploy

on:
  push:
    branches: [develop, main]

jobs:
  determine-environment:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: determine-environment
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-environment.outputs.environment }}
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          ENVIRONMENT: ${{ needs.determine-environment.outputs.environment }}
        run: |
          npm install -g vercel@latest
          PROD_FLAG=""
          if [ "$ENVIRONMENT" = "production" ]; then PROD_FLAG="--prod"; fi
          vercel pull --yes --token="$VERCEL_TOKEN"
          vercel build $PROD_FLAG --token="$VERCEL_TOKEN"
          url=$(vercel deploy --prebuilt $PROD_FLAG --token="$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"

  smoke-test:
    needs: [determine-environment, deploy]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke tests
        run: bash ci/smoke-test.sh "${{ needs.deploy.outputs.url }}"

  readiness-note:
    needs: [determine-environment, deploy, smoke-test]
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deployed to ${{ needs.determine-environment.outputs.environment }}: ${{ needs.deploy.outputs.url }}"
          echo "Run /deploy-check for the full security/environment/readiness chain (CLAUDE.md §2)."
